<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larmindon Audio Pipeline Visualization</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Larmindon Audio Pipeline</h1>
  <p class="subtitle">Real-time speech-to-text data flow visualization</p>
</header>

<div class="controls">
  <button id="btn-start" class="btn btn-start">Start Simulation</button>
  <button id="btn-stop" class="btn btn-stop" disabled>Stop</button>
  <div class="speed-control">
    <label for="speed">Speed</label>
    <input type="range" id="speed" min="0.25" max="3" step="0.25" value="1">
    <span id="speed-label">1x</span>
  </div>
  <div class="scenario-control">
    <label for="scenario">Scenario</label>
    <select id="scenario">
      <option value="speech">Normal Speech</option>
      <option value="silence">Silence</option>
      <option value="intermittent">Intermittent Speech</option>
      <option value="stuck">Stuck Decoder (empty chunks)</option>
    </select>
  </div>
</div>

<div class="pipeline-container">
  <svg id="pipeline-svg" viewBox="0 0 1200 620" preserveAspectRatio="xMidYMid meet">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
      </marker>
      <marker id="arrowhead-active" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
      </marker>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- ============ Thread lane labels (background) ============ -->
    <g class="lane-labels" opacity="0.35">
      <text x="1185" y="60" class="lane-text">CPAL Callback</text>
      <line x1="0" y1="90" x2="1200" y2="90" class="lane-divider"/>
      <text x="1185" y="115" class="lane-text">Processing Thread</text>
    </g>

    <!-- ============ Connection paths ============ -->
    <g id="connections">
      <!-- Audio Input → Shared Buffer -->
      <path id="conn-device-buffer" class="conn" d="M 215 70 L 355 70"/>
      <!-- Shared Buffer → Resampler -->
      <path id="conn-buffer-resample" class="conn" d="M 540 70 L 620 70"/>
      <!-- Resampler → VAD -->
      <path id="conn-resample-vad" class="conn" d="M 820 70 L 820 155"/>

      <!-- VAD → Ring Buffer (silence: frames buffered) -->
      <path id="conn-vad-ring" class="conn" d="M 730 230 L 730 310"/>
      <!-- VAD → ASR Buffer (speech: frames forwarded) -->
      <path id="conn-vad-asr" class="conn" d="M 910 230 L 910 310"/>
      <!-- Ring Buffer → ASR Buffer (drain on speech start) -->
      <path id="conn-ring-asr" class="conn conn-drain" d="M 800 390 L 850 390"/>

      <!-- ASR Buffer → Nemotron -->
      <path id="conn-asr-nemotron" class="conn" d="M 980 390 L 1020 390"/>
      <!-- Nemotron → Text Output -->
      <path id="conn-nemotron-output" class="conn" d="M 1070 470 L 1070 510"/>
      <!-- Nemotron → Decoder Reset (feedback loop) -->
      <path id="conn-reset-loop" class="conn conn-reset" d="M 1020 430 Q 960 430 960 390 Q 960 350 1020 350"/>
      <!-- Nemotron → Diagnostics -->
      <path id="conn-nemotron-diag" class="conn conn-diag" d="M 1150 390 L 1185 390"/>
    </g>

    <!-- ============ Stage: Audio Input ============ -->
    <g id="stage-device" class="stage" transform="translate(30, 30)">
      <rect class="stage-bg" width="185" height="80" rx="8"/>
      <text class="stage-title" x="92" y="22">Audio Input (CPAL)</text>
      <text class="stage-detail" x="92" y="40">multi-ch → mono f32</text>
      <g class="waveform-mini" transform="translate(10, 45)">
        <polyline id="waveform-input" class="waveform" points=""/>
      </g>
    </g>

    <!-- ============ Stage: Shared Buffer ============ -->
    <g id="stage-buffer" class="stage" transform="translate(355, 30)">
      <rect class="stage-bg buffer-bg" width="185" height="80" rx="8"/>
      <text class="stage-title" x="92" y="20">Shared Buffer</text>
      <text class="stage-detail" x="92" y="36">Arc&lt;Mutex&lt;VecDeque&lt;f32&gt;&gt;&gt;</text>
      <g transform="translate(8, 46)">
        <rect class="buffer-visual" x="0" y="0" width="169" height="18" rx="4"/>
        <rect id="buffer-fill" class="buffer-fill" x="1" y="1" width="0" height="16" rx="3"/>
        <text id="buffer-count" class="buffer-count" x="84" y="13">0 samples</text>
      </g>
    </g>

    <!-- ============ Stage: Resampler ============ -->
    <g id="stage-resample" class="stage" transform="translate(620, 30)">
      <rect class="stage-bg" width="200" height="80" rx="8"/>
      <text class="stage-title" x="100" y="22">Resampler (rubato)</text>
      <text class="stage-detail" x="100" y="40">FFT Fixed-In</text>
      <text id="resample-rate" class="stage-detail" x="100" y="56">48kHz → 16kHz</text>
      <circle id="resample-indicator" class="activity-dot" cx="180" cy="15" r="5"/>
    </g>

    <!-- ============ Stage: VAD (Silero) ============ -->
    <g id="stage-vad" class="stage" transform="translate(720, 140)">
      <rect class="stage-bg" width="200" height="95" rx="8"/>
      <text class="stage-title" x="100" y="20">Silero VAD (ONNX)</text>
      <text class="stage-detail" x="100" y="36">512 samples / 32ms frames</text>
      <text id="vad-state" class="stage-state" x="100" y="55">SILENCE</text>
      <!-- Probability bar -->
      <g transform="translate(15, 62)">
        <rect class="prob-track" x="0" y="0" width="170" height="12" rx="3"/>
        <rect id="vad-prob-fill" class="prob-fill" x="1" y="1" width="0" height="10" rx="2"/>
        <line id="vad-threshold" class="threshold-line" x1="85" y1="0" x2="85" y2="12"/>
        <text class="prob-label" x="85" y="22">threshold: 0.5</text>
      </g>
    </g>

    <!-- Decision labels on VAD outputs -->
    <text class="conn-label" x="700" y="278">silence</text>
    <text class="conn-label" x="920" y="278">speech</text>

    <!-- ============ Stage: Pre-Speech Ring Buffer ============ -->
    <g id="stage-ring" class="stage" transform="translate(620, 310)">
      <rect class="stage-bg ring-bg" width="180" height="100" rx="8"/>
      <text class="stage-title" x="90" y="20">Ring Buffer</text>
      <text class="stage-detail" x="90" y="36">500ms pre-speech context</text>
      <!-- Bar-style fill (more readable than arc) -->
      <g transform="translate(10, 46)">
        <rect class="buffer-visual" x="0" y="0" width="160" height="18" rx="4"/>
        <rect id="ring-fill" class="ring-fill-bar" x="1" y="1" width="0" height="16" rx="3"/>
        <text id="ring-count" class="buffer-count" x="80" y="13">0 / 8000</text>
      </g>
      <text id="ring-pct" class="stage-detail" x="90" y="88">0%</text>
    </g>

    <!-- ============ Stage: ASR Buffer ============ -->
    <g id="stage-asr-buffer" class="stage" transform="translate(850, 310)">
      <rect class="stage-bg buffer-bg" width="130" height="100" rx="8"/>
      <text class="stage-title" x="65" y="20">ASR Buffer</text>
      <text class="stage-detail" x="65" y="36">Vec&lt;f32&gt;</text>
      <g transform="translate(8, 46)">
        <rect class="buffer-visual" x="0" y="0" width="114" height="18" rx="4"/>
        <rect id="asr-fill" class="asr-fill" x="1" y="1" width="0" height="16" rx="3"/>
      </g>
      <text id="asr-count" class="buffer-count" x="65" y="82">0 / 8960</text>
      <text id="asr-chunk-info" class="stage-detail" x="65" y="96">chunk: 560ms</text>
    </g>

    <!-- ============ Stage: Nemotron ============ -->
    <g id="stage-nemotron" class="stage" transform="translate(1010, 325)">
      <rect class="stage-bg nemotron-bg" width="150" height="110" rx="8"/>
      <text class="stage-title" x="75" y="20">Nemotron (ORT)</text>
      <text class="stage-detail" x="75" y="36">parakeet-rs</text>
      <text id="nemotron-status" class="stage-state" x="75" y="56">IDLE</text>
      <g transform="translate(8, 64)">
        <rect class="infer-track" x="0" y="0" width="134" height="10" rx="3"/>
        <rect id="infer-progress" class="infer-progress" x="1" y="1" width="0" height="8" rx="2"/>
      </g>
      <text id="nemotron-timing" class="stage-detail" x="75" y="92">0ms</text>
      <text id="empty-count" class="stage-detail empty-count" x="75" y="106"></text>
    </g>

    <!-- ============ Stage: Text Output ============ -->
    <g id="stage-output" class="stage" transform="translate(1000, 510)">
      <rect class="stage-bg output-bg" width="170" height="70" rx="8"/>
      <text class="stage-title" x="85" y="20">Tauri Event</text>
      <text class="stage-detail" x="85" y="36">→ transcription</text>
      <foreignObject x="5" y="40" width="160" height="28">
        <div id="output-text" class="output-text" xmlns="http://www.w3.org/1999/xhtml"></div>
      </foreignObject>
    </g>

    <!-- ============ Decoder reset label ============ -->
    <g id="reset-label" transform="translate(960, 360)" visibility="hidden">
      <rect class="reset-badge" x="-50" y="-10" width="100" height="20" rx="4"/>
      <text id="reset-text" class="reset-text" x="0" y="4">RESET</text>
    </g>

    <!-- ============ Animated particles ============ -->
    <g id="particles"></g>
  </svg>
</div>

<!-- Event log -->
<div class="event-log-container">
  <h2>Event Log</h2>
  <div id="event-log" class="event-log"></div>
</div>

<!-- Legend -->
<div class="legend">
  <h3>Legend</h3>
  <div class="legend-items">
    <div class="legend-item"><span class="legend-dot dot-silence"></span> Silence</div>
    <div class="legend-item"><span class="legend-dot dot-speech"></span> Speech Active</div>
    <div class="legend-item"><span class="legend-dot dot-inference"></span> Inference Running</div>
    <div class="legend-item"><span class="legend-dot dot-reset"></span> Decoder Reset</div>
    <div class="legend-item"><span class="legend-dot dot-drain"></span> Ring Buffer Drain</div>
  </div>
</div>

<script src="pipeline.js"></script>
</body>
</html>
